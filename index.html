<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Адаптивний ігровий автомат</title>
    <style>
      /* Основні стилі (для великих екранів) */
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #1a1a1a;
        color: white;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px; /* Трохи відступу для малих екранів */
      }

      .machine {
        background: #2c3e50;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        text-align: center;
        border: 4px solid #34495e;
        max-width: 100%; /* Щоб не виходила за межі екрана */
        box-sizing: border-box;
      }

      .slots {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
        justify-content: center; /* Центруємо слоти */
      }

      .slot {
        width: 90px;
        height: 120px;
        background: #ecf0f1;
        color: #2c3e50;
        font-size: 5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.4);
        transition:
          font-size 0.3s,
          width 0.3s,
          height 0.3s; /* Плавна зміна */
      }

      button {
        padding: 15px 40px;
        font-size: 1.5rem;
        font-weight: bold;
        cursor: pointer;
        background: #e74c3c;
        color: white;
        border: none;
        border-radius: 8px;
        transition:
          background 0.2s,
          padding 0.3s,
          font-size 0.3s;
        text-transform: uppercase;
        width: 100%; /* Кнопка на всю ширину на мобільних */
        max-width: 300px; /* Але не ширша за 300px */
      }

      button:hover {
        background: #c0392b;
      }
      button:disabled {
        background: #7f8c8d;
        cursor: not-allowed;
      }

      #result {
        margin-top: 20px;
        font-size: 1.5rem;
        font-weight: bold;
        min-height: 28px;
        text-transform: uppercase;
      }

      /* Стилі для мобільних пристроїв (ширина екрана до 600px) */
      @media (max-width: 600px) {
        .machine {
          padding: 15px; /* Зменшуємо відступи */
        }

        .slots {
          gap: 10px; /* Зменшуємо відстань між слотами */
        }

        .slot {
          width: 60px; /* Зменшуємо ширину слота */
          height: 80px; /* Зменшуємо висоту слота */
          font-size: 3.5rem; /* Зменшуємо розмір цифр */
        }

        button {
          padding: 10px 20px; /* Зменшуємо відступи кнопки */
          font-size: 1.2rem; /* Зменшуємо шрифт кнопки */
        }

        #result {
          font-size: 1.2rem; /* Зменшуємо шрифт результату */
        }
      }
    </style>
  </head>
  <body>
    <div class="machine">
      <div class="slots">
        <div class="slot" id="slot1">7</div>
        <div class="slot" id="slot2">7</div>
        <div class="slot" id="slot3">7</div>
      </div>
      <button id="spinBtn" onclick="spin()">Крутити</button>
      <div id="result"></div>
    </div>

    <script>
      function spin() {
        const btn = document.getElementById("spinBtn");
        const result = document.getElementById("result");
        const slots = [
          document.getElementById("slot1"),
          document.getElementById("slot2"),
          document.getElementById("slot3"),
        ];

        btn.disabled = true;
        result.textContent = "";

        let intervals = [];
        let finalNumbers = [];

        slots.forEach((slot, index) => {
          // Швидка анімація "крутіння"
          intervals[index] = setInterval(() => {
            slot.textContent = Math.floor(Math.random() * 9) + 1;
          }, 50);
        });

        // Послідовна зупинка кожного слота
        setTimeout(() => stopSlot(0), 1000);
        setTimeout(() => stopSlot(1), 1500);
        setTimeout(() => stopSlot(2), 2000);

        function stopSlot(index) {
          clearInterval(intervals[index]);
          const num = Math.floor(Math.random() * 9) + 1;
          slots[index].textContent = num;
          finalNumbers[index] = num;

          // Перевірка результату після зупинки останнього слота
          if (index === 2) {
            btn.disabled = false;
            checkWin(finalNumbers);
          }
        }

        function checkWin(numbers) {
          if (numbers[0] === numbers[1] && numbers[1] === numbers[2]) {
            result.textContent = "Джекпот!";
            result.style.color = "#2ecc71";
          } else {
            result.textContent = "Програш";
            result.style.color = "#e74c3c";
          }
        }
      }
    </script>
  </body>
</html>
