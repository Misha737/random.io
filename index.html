<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ігровий автомат</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #1a1a1a;
        color: white;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
      }

      .machine {
        background: #2c3e50;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        text-align: center;
        border: 4px solid #34495e;
        max-width: 100%;
        box-sizing: border-box;
      }

      .slots {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
        justify-content: center;
      }

      .slot {
        width: 90px;
        height: 120px;
        background: #ecf0f1;
        color: #2c3e50;
        font-size: 5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.4);
        transition:
          font-size 0.3s,
          width 0.3s,
          height 0.3s;
      }

      button {
        padding: 15px 40px;
        font-size: 1.5rem;
        font-weight: bold;
        cursor: pointer;
        background: #e74c3c;
        color: white;
        border: none;
        border-radius: 8px;
        transition:
          background 0.2s,
          padding 0.3s,
          font-size 0.3s;
        text-transform: uppercase;
        width: 100%;
        max-width: 300px;
      }

      button:hover {
        background: #c0392b;
      }
      button:disabled {
        background: #7f8c8d;
        cursor: not-allowed;
      }

      @media (max-width: 600px) {
        .machine {
          padding: 15px;
        }
        .slots {
          gap: 10px;
        }
        .slot {
          width: 60px;
          height: 80px;
          font-size: 3.5rem;
        }
        button {
          padding: 10px 20px;
          font-size: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="machine">
      <div class="slots">
        <div class="slot" id="slot1">5</div>
        <div class="slot" id="slot2">9</div>
        <div class="slot" id="slot3">2</div>
      </div>
      <button id="spinBtn" onclick="spin()">Крутити</button>
    </div>

    <script>
      function spin() {
        const btn = document.getElementById("spinBtn");
        const slots = [
          document.getElementById("slot1"),
          document.getElementById("slot2"),
          document.getElementById("slot3"),
        ];

        btn.disabled = true;

        let intervals = [];
        // Масив з виграшною комбінацією
        const targetNumbers = [5, 9, 2];

        slots.forEach((slot, index) => {
          // Анімація крутіння (випадкові цифри)
          intervals[index] = setInterval(() => {
            slot.textContent = Math.floor(Math.random() * 9) + 1;
          }, 50);
        });

        setTimeout(() => stopSlot(0), 1000);
        setTimeout(() => stopSlot(1), 1500);
        setTimeout(() => stopSlot(2), 2000);

        function stopSlot(index) {
          clearInterval(intervals[index]);
          // Замість випадкового числа ставимо фіксоване з масиву
          slots[index].textContent = targetNumbers[index];

          if (index === 2) {
            btn.disabled = false;
          }
        }
      }
    </script>
  </body>
</html>
