<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ігровий автомат</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #1a1a1a;
        color: white;
        font-family: Arial, sans-serif;
        margin: 0;
      }
      .machine {
        background: #2c3e50;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        text-align: center;
        border: 4px solid #34495e;
      }
      .slots {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }
      .slot {
        width: 90px;
        height: 120px;
        background: #ecf0f1;
        color: #2c3e50;
        font-size: 5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.4);
      }
      button {
        padding: 15px 40px;
        font-size: 1.5rem;
        font-weight: bold;
        cursor: pointer;
        background: #e74c3c;
        color: white;
        border: none;
        border-radius: 8px;
        transition: background 0.2s;
        text-transform: uppercase;
      }
      button:hover {
        background: #c0392b;
      }
      button:disabled {
        background: #7f8c8d;
        cursor: not-allowed;
      }
      #result {
        margin-top: 20px;
        font-size: 1.5rem;
        font-weight: bold;
        min-height: 28px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="machine">
      <div class="slots">
        <div class="slot" id="slot1">7</div>
        <div class="slot" id="slot2">7</div>
        <div class="slot" id="slot3">7</div>
      </div>
      <button id="spinBtn" onclick="spin()">Крутити</button>
      <div id="result"></div>
    </div>

    <script>
      function spin() {
        const btn = document.getElementById("spinBtn");
        const result = document.getElementById("result");
        const slots = [
          document.getElementById("slot1"),
          document.getElementById("slot2"),
          document.getElementById("slot3"),
        ];

        btn.disabled = true;
        result.textContent = "";

        let intervals = [];
        let finalNumbers = [];

        slots.forEach((slot, index) => {
          intervals[index] = setInterval(() => {
            slot.textContent = Math.floor(Math.random() * 9) + 1;
          }, 50);
        });

        setTimeout(() => stopSlot(0), 1000);
        setTimeout(() => stopSlot(1), 1500);
        setTimeout(() => stopSlot(2), 2000);

        function stopSlot(index) {
          clearInterval(intervals[index]);
          const num = Math.floor(Math.random() * 9) + 1;
          slots[index].textContent = num;
          finalNumbers[index] = num;

          if (index === 2) {
            btn.disabled = false;
            checkWin(finalNumbers);
          }
        }

        function checkWin(numbers) {
          if (numbers[0] === numbers[1] && numbers[1] === numbers[2]) {
            result.textContent = "Джекпот!";
            result.style.color = "#2ecc71";
          } else {
            result.textContent = "Програш";
            result.style.color = "#e74c3c";
          }
        }
      }
    </script>
  </body>
</html>
